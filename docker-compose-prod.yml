services:
  mysql:
    image: mysql:8.0
    container_name: lucidplus_mysql
    environment:
      MYSQL_ROOT_PASSWORD: Muralikumar@790
      MYSQL_DATABASE: lucidplus
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - lucidplus-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: murali6122004/lucidplustransfer-app:latest
    container_name: lucidplus_app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://lucidplus_mysql:3306/lucidplus?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Muralikumar@790
    ports:
      - "8080:8080"
    networks:
      - lucidplus-network

volumes:
  mysql_data:

networks:
  lucidplus-network:
    driver: bridge